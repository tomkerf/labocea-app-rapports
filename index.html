<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b6fb8" />
    <meta name="description" content="Saisie terrain et rapports d'intervention — Labocea" />
    <title>Labocea — Rapports terrain</title>
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; z-index: 9999; background: white; padding: 20px; font-family: monospace;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById("error-log").innerHTML += "<p>" + msg + "<br/>" + (error && error.stack ? error.stack : "") + "</p>";
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
